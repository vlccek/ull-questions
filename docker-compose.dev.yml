version: '3.8'

services:
  db_dev:
    image: postgres:15-alpine
    container_name: ull_postgres_dev
    restart: always
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: ull_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5433:5432" # Mapování: tvůj PC port 5433 -> kontejner port 5432

volumes:
  postgres_dev_data: